# =============================================================================
# Configuration tmux — partageable entre machines
# Le fichier ~/.tmux.local.conf surcharge les parametres specifiques a la machine
# =============================================================================

# Prefixe standard Ctrl-b
# Recharger la configuration avec r
bind r source-file ~/.tmux.conf \; display "Config rechargee!"

# Splits intuitifs (garde le chemin courant)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation entre panneaux avec hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionner les panneaux avec HJKL
bind H resize-pane -L 2
bind J resize-pane -D 2
bind K resize-pane -U 2
bind L resize-pane -R 2

# Souris activee (scroll, clic, resize)
set -g mouse on

# Copier-coller souris : la selection copie direct dans le presse-papier
# Relacher le bouton = copie. Clic droit = coller.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -n MouseDown3Pane run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Fenetres et panneaux commencent a 1
set -g base-index 1
set -g pane-base-index 1
# Renumeroter automatiquement les fenetres
set -g renumber-windows on

# Couleurs 256
set -g default-terminal "screen-256color"

# Historique genereux
set -g history-limit 50000

# Delai escape reduit (pour vim/emacs)
set -sg escape-time 10

# Mode vi pour la copie
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Nouvelles fenetres dans le chemin courant
bind c new-window -c "#{pane_current_path}"

# Notifications d'activite
setw -g monitor-activity on
set -g visual-activity off

# =============================================================================
# Barre de statut — theme kaki/vert
# =============================================================================

set -g status-position bottom
set -g status-interval 5
set -g status-style fg=colour151,bg=colour237

# Fenetres — la fenetre active se demarque bien
set -g window-status-format "#[fg=colour242] #I #[fg=colour245]#W "
set -g window-status-current-format "#[fg=colour237,bg=colour108,bold] #I #W #[default]"
set -g window-status-activity-style fg=colour214,bg=colour237
set -g window-status-separator ""

# Gauche : machine + session
set -g status-left-length 60
set -g status-left "#[fg=colour237,bg=colour150,bold] ⬢ #H #[fg=colour150,bg=colour240]#[fg=colour255,bg=colour240] #S #[fg=colour240,bg=colour237] "

# Droite : fenetre/panneau + uptime + heure + date
set -g status-right-length 60
set -g status-right "#[fg=colour245]#I:#P #[fg=colour108]│ #[fg=colour150]%H:%M #[fg=colour237,bg=colour108,bold] %a %d/%m "

# Bordures des panneaux
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour108

# Messages et mode commande
set -g message-style fg=colour237,bg=colour150,bold
set -g mode-style fg=colour237,bg=colour150

# =============================================================================
# Plugins (persistence des sessions)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =============================================================================
# Config locale (specifique a cette machine — non partagee)
# =============================================================================
if-shell "[ -f ~/.tmux.local.conf ]" "source-file ~/.tmux.local.conf"

# Initialisation TPM (doit rester a la fin)
run '~/.tmux/plugins/tpm/tpm'
